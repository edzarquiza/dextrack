<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DexTrack — Dexterous Group</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#F7F6F3;--surface:#FFFFFF;--surface-2:#F0EEE9;
  --sidebar-bg:#18181B;--sidebar-hover:#27272A;
  --text:#18181B;--text-2:#71717A;--text-3:#A1A1AA;
  --border:#E4E4E7;--border-2:#D4D4D8;
  --accent:#0D9488;--accent-bg:#CCFBF1;--accent-text:#0F766E;
  --danger:#DC2626;--danger-bg:#FEE2E2;--danger-text:#B91C1C;
  --warning:#D97706;--warning-bg:#FEF3C7;--warning-text:#B45309;
  --success:#16A34A;--success-bg:#DCFCE7;--success-text:#15803D;
  --blue:#2563EB;--blue-bg:#DBEAFE;--blue-text:#1D4ED8;
  --purple:#7C3AED;--purple-bg:#EDE9FE;--purple-text:#6D28D9;
  --cyan:#0891B2;--cyan-bg:#CFFAFE;--cyan-text:#0E7490;
  --r:8px;--rl:12px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;display:flex;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px}

/* SIDEBAR */
.sidebar{width:224px;flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid #27272A;display:flex;align-items:center;gap:10px}
.sb-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-icon svg{width:16px;height:16px}
.sb-name{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.2px}
.sb-sub{font-size:10px;color:#52525B;letter-spacing:.5px;text-transform:uppercase}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-section{margin-bottom:18px}
.sb-label{font-size:10px;font-weight:500;color:#52525B;letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:3px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;color:#A1A1AA;font-size:13px;font-weight:400;transition:all .12s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif}
.nav-item:hover{background:var(--sidebar-hover);color:#E4E4E7}
.nav-item.active{background:#27272A;color:#fff;font-weight:500}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;background:#3F3F46;color:#A1A1AA;font-size:10px;font-family:'DM Mono',monospace;padding:1px 6px;border-radius:10px;min-width:20px;text-align:center}
.nav-item.active .nav-badge{background:var(--accent);color:#fff}
.sb-footer{padding:10px 8px;border-top:1px solid #27272A}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.topbar-left{display:flex;align-items:center;gap:12px}
.page-title{font-size:15px;font-weight:600;letter-spacing:-.2px}
.topbar-right{display:flex;gap:8px;align-items:center}
.work-week-chip{font-size:11.5px;color:var(--text-3);background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-family:'DM Mono',monospace;white-space:nowrap}

/* TEAM TOGGLE */
.team-toggle{display:flex;background:var(--surface-2);border-radius:7px;padding:3px;gap:2px;border:1px solid var(--border)}
.tt-btn{padding:4px 12px;border-radius:5px;border:none;background:none;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-2);font-family:'DM Sans',sans-serif;transition:all .12s}
.tt-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

.content{flex:1;overflow-y:auto;padding:20px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border-2);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--surface-2)}
.btn:active{transform:scale(.98)}
.btn svg{width:13px;height:13px}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#0F766E;border-color:#0F766E}
.btn-danger{background:var(--danger-bg);color:var(--danger-text);border-color:#FECACA}
.btn-success{background:var(--success-bg);color:var(--success-text);border-color:#BBF7D0}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}
.btn-icon{padding:6px;border-radius:var(--r)}

/* METRICS */
.metrics-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;box-shadow:var(--shadow)}
.metric-label{font-size:11px;color:var(--text-2);font-weight:500;letter-spacing:.2px;text-transform:uppercase;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-1px;line-height:1;margin-bottom:3px}
.metric-sub{font-size:11.5px;color:var(--text-3)}
.m-accent{border-left:3px solid var(--accent)}
.m-warn{border-left:3px solid var(--warning)}
.m-danger{border-left:3px solid var(--danger)}
.m-blue{border-left:3px solid var(--blue)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.card-title{font-size:13.5px;font-weight:600;letter-spacing:-.1px}
.card-body{padding:16px 18px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:2px 7px;border-radius:20px}
.b-open{background:var(--surface-2);color:var(--text-2)}
.b-progress{background:var(--blue-bg);color:var(--blue-text)}
.b-done{background:var(--success-bg);color:var(--success-text)}
.b-overdue{background:var(--danger-bg);color:var(--danger-text)}
.b-it{background:var(--warning-bg);color:var(--warning-text)}
.b-web{background:var(--blue-bg);color:var(--blue-text)}
.b-bug{background:var(--danger-bg);color:var(--danger-text)}
.b-infra{background:var(--purple-bg);color:var(--purple-text)}
.b-feature{background:var(--accent-bg);color:var(--accent-text)}
.b-label-dexiq{background:#DBEAFE;color:#1D4ED8}
.b-label-energin{background:#EDE9FE;color:#6D28D9}
.b-label-dex{background:var(--cyan-bg);color:var(--cyan-text)}
.b-label-marketing{background:#FCE7F3;color:#9D174D}
.pdot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.p-low{background:#86EFAC}.p-medium{background:#FCD34D}.p-high{background:#F97316}.p-critical{background:#EF4444}

/* JIRA BOARD */
.board-wrap{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;height:calc(100vh - 170px);overflow:hidden}
.board-col{display:flex;flex-direction:column;border-radius:var(--rl);overflow:hidden;background:var(--surface-2);border:1px solid var(--border);transition:border-color .15s}
.board-col.drag-over{border-color:var(--accent);background:#F0FDFA}
.board-col-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.board-col-title{font-size:12.5px;font-weight:600;letter-spacing:-.1px}
.col-count{font-size:11px;font-family:'DM Mono',monospace;background:rgba(0,0,0,.06);padding:1px 7px;border-radius:10px;color:var(--text-2)}
.board-cards{flex:1;overflow-y:auto;padding:8px;min-height:60px}
.col-todo .board-col-header{background:#F4F4F5}
.col-progress .board-col-header{background:#EFF6FF}
.col-done .board-col-header{background:#F0FDF4}
.col-todo .board-col-title{color:#52525B}
.col-progress .board-col-title{color:var(--blue)}
.col-done .board-col-title{color:var(--success)}
.board-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;cursor:grab;transition:all .12s;box-shadow:var(--shadow);user-select:none}
.board-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.board-card.dragging{opacity:.4;cursor:grabbing;transform:scale(.98)}
.board-card-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-3);margin-bottom:3px}
.board-card-title{font-size:12.5px;font-weight:500;line-height:1.4;margin-bottom:8px;color:var(--text)}
.board-card-meta{display:flex;align-items:center;justify-content:space-between;gap:6px}
.board-card-footer{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
.avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;background:var(--accent-bg);color:var(--accent-text);flex-shrink:0}
.timer-chip{font-family:'DM Mono',monospace;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--surface-2);color:var(--text-2)}
.timer-chip.running{background:var(--accent-bg);color:var(--accent-text);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

/* TICKET TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;font-weight:500;color:var(--text-3);letter-spacing:.5px;text-transform:uppercase;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap;cursor:pointer;user-select:none}
.tbl th:hover{color:var(--text-2)}
.tbl th .sort-icon{display:inline-block;margin-left:4px;opacity:.4;font-style:normal}
.tbl th.sorted .sort-icon{opacity:1;color:var(--accent)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#FAFAF9;cursor:pointer}
.tid{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-3)}
.progress-wrap{background:var(--border);border-radius:3px;height:3px;overflow:hidden;min-width:60px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}

/* TIMER */
.timer-display{font-family:'DM Mono',monospace;font-size:12.5px;font-weight:500;color:var(--text-2);background:var(--surface-2);padding:3px 9px;border-radius:5px;min-width:68px;text-align:center;display:inline-block}
.timer-display.running{background:var(--accent-bg);color:var(--accent-text);animation:pulse 2s infinite}

/* SEARCH BAR */
.search-wrap{position:relative;flex:1;max-width:260px}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--text-3);pointer-events:none}
.search-input{width:100%;padding:6px 10px 6px 30px;border:1px solid var(--border-2);border-radius:var(--r);font-size:13px;color:var(--text);background:var(--surface);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .12s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(13,148,136,.08)}
.search-input::placeholder{color:var(--text-3)}

/* FILTERS */
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg)}
.filter-bar select{padding:5px 9px;border:1px solid var(--border-2);border-radius:6px;font-size:12.5px;color:var(--text);background:var(--surface);font-family:'DM Sans',sans-serif;cursor:pointer;outline:none}
.filter-bar select:focus{border-color:var(--accent)}

/* BENCH FILTER BAR */
.bench-filter{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.bench-filter select,.bench-filter input[type=date]{padding:5px 10px;border:1px solid var(--border-2);border-radius:6px;font-size:12.5px;color:var(--text);background:var(--surface);font-family:'DM Sans',monospace;cursor:pointer;outline:none}
.bench-filter input[type=date]:focus,.bench-filter select:focus{border-color:var(--accent)}
.bench-range-label{font-size:12px;color:var(--text-3);font-weight:500}
.preset-btns{display:flex;gap:4px;flex-wrap:wrap}
.preset-btn{padding:4px 10px;border:1px solid var(--border-2);border-radius:6px;font-size:11.5px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text-2);font-family:'DM Sans',sans-serif;transition:all .12s}
.preset-btn:hover{background:var(--surface-2)}
.preset-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* FORMS */
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:12px;font-weight:500;color:var(--text-2)}
.form-control{padding:8px 11px;border:1px solid var(--border-2);border-radius:var(--r);font-size:13.5px;color:var(--text);background:var(--surface);font-family:'DM Sans',sans-serif;transition:border-color .12s,box-shadow .12s;outline:none}
.form-control:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
textarea.form-control{resize:vertical;min-height:72px;line-height:1.5}

/* MODALS / OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--rl);box-shadow:0 20px 60px rgba(0,0,0,.15);width:500px;max-width:calc(100vw - 48px);max-height:calc(100vh - 80px);overflow-y:auto}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:600}
.modal-body{padding:18px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:90;display:flex;justify-content:flex-end}
.detail-panel{width:480px;max-width:100vw;background:var(--surface);height:100%;overflow-y:auto;box-shadow:-6px 0 28px rgba(0,0,0,.1);display:flex;flex-direction:column}
.detail-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.detail-body{padding:18px 22px;flex:1}
.ds-label{font-size:11px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.tab-nav{display:flex;border-bottom:1px solid var(--border);padding:0 22px;background:var(--surface)}
.tab-btn{padding:10px 14px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-3);font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab-btn:hover{color:var(--text-2)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.log-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12.5px}
.log-item:last-child{border-bottom:none}

/* BENCH */
.bench-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.bar-name{font-size:12px;color:var(--text-2);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.bar-val{font-size:12px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace;min-width:46px;text-align:right}
.person-stat{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--border)}
.person-stat:last-child{border-bottom:none}
.rate-circle{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;font-family:'DM Mono',monospace}

/* DASHBOARD CHARTS */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.dash-chart-wrap{position:relative;display:flex;align-items:center;justify-content:center;padding:16px 0}
.donut-center{position:absolute;text-align:center;pointer-events:none}
.donut-center-val{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-1px}
.donut-center-label{font-size:11px;color:var(--text-3);margin-top:1px}
.legend-wrap{display:flex;flex-direction:column;gap:7px;padding:0 4px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.legend-label{color:var(--text-2);flex:1}
.legend-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--text)}
.legend-pct{font-size:11px;color:var(--text-3);min-width:34px;text-align:right}
.status-cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.status-card{border-radius:var(--rl);padding:12px 14px;text-align:center}
.sc-todo{background:#F4F4F5;border:1px solid #E4E4E7}
.sc-prog{background:#EFF6FF;border:1px solid #BFDBFE}
.sc-done{background:#F0FDF4;border:1px solid #BBF7D0}
.sc-label{font-size:10.5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;margin-bottom:5px}
.sc-val{font-size:26px;font-weight:700;letter-spacing:-1.5px;line-height:1}
.sc-todo .sc-label{color:#71717A}.sc-todo .sc-val{color:#3F3F46}
.sc-prog .sc-label{color:#1D4ED8}.sc-prog .sc-val{color:#2563EB}
.sc-done .sc-label{color:#15803D}.sc-done .sc-val{color:#16A34A}

/* WORK WEEK BANNER */
.week-banner{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:12px 18px;margin-bottom:18px;box-shadow:var(--shadow)}
.week-range{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.week-sub{font-size:12px;color:var(--text-3);margin-top:1px}
.week-stats{display:flex;gap:20px;margin-left:auto}
.week-stat{text-align:right}
.week-stat-val{font-size:18px;font-weight:600;letter-spacing:-.5px}
.week-stat-label{font-size:11px;color:var(--text-3)}

/* SETTINGS */
.staff-item{display:flex;align-items:center;gap:10px;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);margin-bottom:6px}
.staff-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:var(--accent-bg);color:var(--accent-text);flex-shrink:0}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;color:var(--text-3);text-align:center}
.empty-state svg{width:36px;height:36px;margin-bottom:10px;opacity:.25}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--sidebar-bg);color:#fff;padding:11px 16px;border-radius:var(--rl);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);z-index:200;display:flex;align-items:center;gap:7px;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* EXPORT MODAL */
.export-info{background:var(--surface-2);border-radius:var(--r);padding:10px 14px;font-size:12.5px;color:var(--text-2);margin-top:12px;border:1px solid var(--border)}
.export-count{font-size:20px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-brand">
    <div class="sb-icon">
      <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
    </div>
    <div>
      <div class="sb-name">DexTrack</div>
      <div class="sb-sub">Dexterous Group</div>
    </div>
  </div>
  <nav class="sb-nav">

'use strict';
// ═══════════════════════════════════════════════════════
// CONSTANTS & STATE
// ═══════════════════════════════════════════════════════
// ── GOOGLE SHEETS CONFIG ── fill these in after setup ──
const GS_CLIENT_ID  = '389342410676-dufjkb19la6uobk5oj6f6dm94e815pjl.apps.googleusercontent.com';
const GS_SHEET_ID   = '1GC6o3k5gRZ2M0XyjJI1VBj6eNwpuDQ8GOyN3GHoWLXg';
const GS_SHEET_NAME = 'Sheet1'; // tab name inside your Google Sheet
const GS_SCOPES     = 'https://www.googleapis.com/auth/spreadsheets';
// ────────────────────────────────────────────────────────

const STORE = 'dextrack_v4_cache'; // local cache for offline resilience
const WEB_LABELS = ['WDD-DexIQ','WDD-Energin','WDD-DexterousGroup','WDD-MARKETING'];
const TICKET_TYPES_IT = ['IT Support','Infrastructure','Network','Hardware','Software'];
const TICKET_TYPES_WEB = ['Web Dev','Bug Fix','Feature','Design','SEO'];
const PRIORITIES = ['Low','Medium','High','Critical'];
const STATUSES = ['To Do','In Progress','Done'];

// App state
let db = null;
let timers = {};          // { ticketId: {interval, secs} }
let currentView = 'dashboard';
let currentTeam = 'all';
let dragId = null;        // id of card being dragged
let dragDidDrop = false;  // prevent click firing after drop

// Filter states (separate per view to avoid cross-contamination)
let ticketFilters = { assignee:'', type:'', status:'', search:'' };
let ticketSort    = { col:'due', dir:'asc' };
let benchFilters  = { preset:'this-week', from:'', to:'' };

// ═══════════════════════════════════════════════════════
// GOOGLE SHEETS DATA LAYER
// ═══════════════════════════════════════════════════════

// Google Identity / token state
let gsAccessToken  = null;
let gsTokenExpiry  = 0;
let gsSignedIn     = false;
let gsUserName     = '';
let gsUserEmail    = '';
let gsRowMap       = {};  // ticketId → sheet row number (1-based, excluding header)
let gsSaving       = false;
let gsSaveQueue    = [];  // pending save operations

// ── Sheet column order (must match your Google Sheet header row) ──
const COLS = ['id','title','team','type','assignee','priority','status','due','est','logsJson','notes','label','created'];
const COL_IDX = {}; COLS.forEach((c,i) => COL_IDX[c] = i);

// ── Local cache fallback ──
function getCached() {
  try {
    const raw = localStorage.getItem(STORE);
    if (raw) { const d = JSON.parse(raw); if (d && Array.isArray(d.tickets)) return d; }
  } catch(e){}
  return null;
}
function setCache(data) {
  try { localStorage.setItem(STORE, JSON.stringify(data)); } catch(e){}
}

function getDefaultStaff() {
  return [
    {id:'s1',name:'Alex',role:'IT Support Specialist',team:'IT'},
    {id:'s2',name:'Jamie',role:'IT Support Specialist',team:'IT'},
    {id:'s3',name:'Sam',role:'Web Developer',team:'Web'},
    {id:'s4',name:'Riley',role:'Web Developer',team:'Web'},
  ];
}

// ── Row ↔ Ticket conversion ──
function rowToTicket(row) {
  const g = (col) => (row[COL_IDX[col]] || '').toString().trim();
  let logs = [];
  try { logs = JSON.parse(g('logsJson')) || []; } catch(e){}
  return {
    id:       g('id'),
    title:    g('title'),
    team:     g('team'),
    type:     g('type'),
    assignee: g('assignee'),
    priority: g('priority'),
    status:   g('status'),
    due:      g('due'),
    est:      parseInt(g('est')) || 0,
    logs,
    notes:    g('notes'),
    label:    g('label'),
    created:  g('created'),
  };
}

function ticketToRow(t) {
  return COLS.map(col => {
    if (col === 'logsJson') return JSON.stringify(t.logs || []);
    if (col === 'est')      return (t.est || 0).toString();
    return (t[col] || '').toString();
  });
}

// ── Google Identity Services (GIS) sign-in ──
function initGoogleAuth() {
  if (typeof google === 'undefined') {
    showConfigError('Google Identity Services failed to load. Check your internet connection.');
    return;
  }
  if (!GS_CLIENT_ID || GS_CLIENT_ID.includes('YOUR_CLIENT_ID')) {
    showConfigScreen();
    return;
  }
  renderSignInScreen();
}

function signIn() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GS_CLIENT_ID,
    scope: GS_SCOPES,
    callback: async (resp) => {
      if (resp.error) { toast('Sign-in failed: ' + resp.error, '✕'); return; }
      gsAccessToken = resp.access_token;
      gsTokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
      gsSignedIn = true;
      // Get user info
      try {
        const ui = await gFetch('https://www.googleapis.com/oauth2/v3/userinfo');
        gsUserName  = ui.name || ui.email || 'User';
        gsUserEmail = ui.email || '';
      } catch(e) { gsUserName = 'User'; }
      removeSignInScreen();
      showLoadingOverlay('Loading tickets from Google Sheets…');
      await loadFromSheet();
      hideLoadingOverlay();
      updateAuthUI();
      updateBadges();
      updateWeekChip();
      navigate('dashboard');
    },
  });
  client.requestAccessToken({prompt: 'consent'});
}

function signOut() {
  if (gsAccessToken) google.accounts.oauth2.revoke(gsAccessToken, () => {});
  gsAccessToken = null;
  gsSignedIn    = false;
  gsUserName    = '';
  db = { staff: getDefaultStaff(), tickets: [] };
  renderSignInScreen();
}

// ── HTTP helper ──
async function gFetch(url, method='GET', body=null) {
  if (!gsAccessToken) throw new Error('Not signed in');
  const opts = {
    method,
    headers: {
      'Authorization': 'Bearer ' + gsAccessToken,
      'Content-Type': 'application/json',
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error((err.error && err.error.message) || ('HTTP ' + res.status));
  }
  return res.json();
}

// ── Load all tickets from sheet ──
async function loadFromSheet() {
  try {
    const range = encodeURIComponent(`${GS_SHEET_NAME}!A2:M`);
    const url   = `https://sheets.googleapis.com/v4/spreadsheets/${GS_SHEET_ID}/values/${range}`;
    const data  = await gFetch(url);
    const rows  = data.values || [];
    gsRowMap    = {};
    const tickets = [];
    rows.forEach((row, i) => {
      if (!row[0]) return; // skip empty rows
      const t = rowToTicket(row);
      if (t.id) {
        tickets.push(t);
        gsRowMap[t.id] = i + 2; // +2: 1-based + header row
      }
    });
    // Load staff from cache or use defaults
    const cached = getCached();
    const staff  = (cached && cached.staff) ? cached.staff : getDefaultStaff();
    db = { staff, tickets };
    setCache(db);
    toast(`Loaded ${tickets.length} tickets`, '✓');
  } catch(e) {
    toast('Could not load from Google Sheets: ' + e.message, '⚠');
    // Fall back to local cache
    const cached = getCached();
    if (cached) { db = cached; toast('Showing cached data', 'ℹ'); }
    else db = { staff: getDefaultStaff(), tickets: [] };
  }
}

// ── Append a new ticket row ──
async function gsAppendTicket(t) {
  try {
    const range = encodeURIComponent(`${GS_SHEET_NAME}!A:M`);
    const url   = `https://sheets.googleapis.com/v4/spreadsheets/${GS_SHEET_ID}/values/${range}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`;
    const res   = await gFetch(url, 'POST', { values: [ticketToRow(t)] });
    // Extract row number from updatedRange e.g. "Sheet1!A12:M12"
    const match = (res.updates && res.updates.updatedRange || '').match(/(\d+):/);
    if (match) gsRowMap[t.id] = parseInt(match[1]);
    setCache(db);
  } catch(e) {
    toast('Save failed: ' + e.message, '⚠');
  }
}

// ── Update an existing ticket row ──
async function gsUpdateTicket(t) {
  const rowNum = gsRowMap[t.id];
  if (!rowNum) {
    // Row not known — append instead
    await gsAppendTicket(t);
    return;
  }
  try {
    const range = encodeURIComponent(`${GS_SHEET_NAME}!A${rowNum}:M${rowNum}`);
    const url   = `https://sheets.googleapis.com/v4/spreadsheets/${GS_SHEET_ID}/values/${range}?valueInputOption=RAW`;
    await gFetch(url, 'PUT', { values: [ticketToRow(t)] });
    setCache(db);
  } catch(e) {
    toast('Update failed: ' + e.message, '⚠');
  }
}

// ── Delete a ticket row ──
async function gsDeleteTicket(id) {
  const rowNum = gsRowMap[id];
  if (!rowNum) return;
  try {
    // Get sheet ID (gid) first
    const meta = await gFetch(`https://sheets.googleapis.com/v4/spreadsheets/${GS_SHEET_ID}?fields=sheets.properties`);
    const sheet = (meta.sheets || []).find(s => s.properties.title === GS_SHEET_NAME);
    const sheetGid = sheet ? sheet.properties.sheetId : 0;
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${GS_SHEET_ID}:batchUpdate`;
    await gFetch(url, 'POST', {
      requests: [{
        deleteDimension: {
          range: { sheetId: sheetGid, dimension: 'ROWS', startIndex: rowNum - 1, endIndex: rowNum }
        }
      }]
    });
    delete gsRowMap[id];
    // Shift all row numbers after deleted row down by 1
    Object.keys(gsRowMap).forEach(tid => { if (gsRowMap[tid] > rowNum) gsRowMap[tid]--; });
    setCache(db);
  } catch(e) {
    toast('Delete from sheet failed: ' + e.message, '⚠');
  }
}

// ── Update staff in localStorage (staff not in sheet) ──
function saveStaff() {
  setCache(db);
}

// ── Main save function (replaces old localStorage save) ──
// Called throughout the app — queues operations to avoid race conditions
async function save(operation='update', ticketId=null) {
  setCache(db); // always update local cache immediately
  if (!gsSignedIn) return; // offline / not signed in → cache only
  if (!ticketId) return;   // no specific ticket → cache only (e.g. staff changes)
  const t = db.tickets.find(t => t.id === ticketId);
  if (operation === 'delete') {
    await gsDeleteTicket(ticketId);
  } else if (operation === 'append') {
    await gsAppendTicket(t);
  } else {
    await gsUpdateTicket(t);
  }
}

// ═══════════════════════════════════════════════════════
// DATE UTILITIES
// ═══════════════════════════════════════════════════════
function todayStr() { return new Date().toISOString().split('T')[0]; }

function getWorkWeek(offsetWeeks) {
  // offsetWeeks: 0 = this week, -1 = last week
  const now = new Date();
  const day = now.getDay(); // 0=Sun,1=Mon...6=Sat
  const diffToMon = (day === 0) ? -6 : 1 - day;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diffToMon + (offsetWeeks * 7));
  mon.setHours(0,0,0,0);
  const fri = new Date(mon);
  fri.setDate(mon.getDate() + 4);
  const fmt = (d) => d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
  return {
    start: mon.toISOString().split('T')[0],
    end: fri.toISOString().split('T')[0],
    label: `${fmt(mon)} – ${fmt(fri)}, ${fri.getFullYear()}`
  };
}

function getMonthRange(offsetMonths) {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + offsetMonths;
  const first = new Date(y, m, 1);
  const last = new Date(y, m + 1, 0);
  return {
    start: first.toISOString().split('T')[0],
    end: last.toISOString().split('T')[0],
    label: first.toLocaleDateString('en-AU',{month:'long',year:'numeric'})
  };
}

function dateInRange(dateStr, from, to) {
  if (!dateStr) return false;
  if (from && dateStr < from) return false;
  if (to && dateStr > to) return false;
  return true;
}

function getBenchRange() {
  const p = benchFilters.preset;
  if (p === 'this-week') return getWorkWeek(0);
  if (p === 'last-week') return getWorkWeek(-1);
  if (p === 'this-month') return getMonthRange(0);
  if (p === 'last-month') return getMonthRange(-1);
  if (p === 'all-time') return { start:'', end:'', label:'All time' };
  // custom
  return { start: benchFilters.from||'', end: benchFilters.to||todayStr(), label:'Custom range' };
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function totalMins(t) { return t.logs.reduce((a,l) => a + (parseInt(l.mins)||0), 0); }

function fmtTime(m) {
  m = parseInt(m) || 0;
  if (!m) return '—';
  if (m < 60) return m + 'm';
  const h = Math.floor(m/60), r = m%60;
  return r ? `${h}h ${r}m` : `${h}h`;
}

function fmtTimer(s) {
  s = parseInt(s) || 0;
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return [h,m,sec].map(x => String(x).padStart(2,'0')).join(':');
}

function fmtDate(s) {
  if (!s) return '—';
  try { return new Date(s+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}); }
  catch(e) { return s; }
}

function isOverdue(t) {
  if (!t || t.status==='Done') return false;
  return t.due < todayStr();
}

function wasLate(t) {
  if (!t || t.status!=='Done' || !t.logs.length) return false;
  return t.logs[t.logs.length-1].date > t.due;
}

function accentCol(pct) {
  return pct <= 100 ? 'var(--accent)' : pct <= 120 ? 'var(--warning)' : 'var(--danger)';
}

function statusBadge(t) {
  if (isOverdue(t)) return `<span class="badge b-overdue">Overdue</span>`;
  const m = {'To Do':'b-open','In Progress':'b-progress','Done':'b-done'};
  return `<span class="badge ${m[t.status]||'b-open'}">${t.status}</span>`;
}

function typeBadge(type) {
  const m = {'IT Support':'b-it','Web Dev':'b-web','Bug Fix':'b-bug','Infrastructure':'b-infra','Feature':'b-feature','Network':'b-infra','Hardware':'b-it','Software':'b-it','Design':'b-web','SEO':'b-feature'};
  return `<span class="badge ${m[type]||'b-open'}">${type}</span>`;
}

function labelBadge(label) {
  if (!label) return '';
  const m = {'WDD-DexIQ':'b-label-dexiq','WDD-Energin':'b-label-energin','WDD-DexterousGroup':'b-label-dex','WDD-MARKETING':'b-label-marketing'};
  return `<span class="badge ${m[label]||'b-open'}">${label}</span>`;
}

function pdot(p) {
  const cls = {Low:'p-low',Medium:'p-medium',High:'p-high',Critical:'p-critical'};
  return `<span class="pdot ${cls[p]||'p-low'}" title="${p}"></span>`;
}

function getFilteredPool() {
  let r = [...db.tickets];
  if (currentTeam !== 'all') r = r.filter(t => t.team === currentTeam);
  return r;
}

function applyTicketFilters(pool) {
  let r = [...pool];
  if (ticketFilters.assignee) r = r.filter(t => t.assignee === ticketFilters.assignee);
  if (ticketFilters.type)     r = r.filter(t => t.type === ticketFilters.type);
  if (ticketFilters.status) {
    if (ticketFilters.status === 'Overdue') r = r.filter(t => isOverdue(t));
    else r = r.filter(t => t.status === ticketFilters.status);
  }
  if (ticketFilters.search) {
    const q = ticketFilters.search.toLowerCase();
    r = r.filter(t =>
      t.title.toLowerCase().includes(q) ||
      t.id.toLowerCase().includes(q) ||
      t.assignee.toLowerCase().includes(q) ||
      t.type.toLowerCase().includes(q) ||
      (t.notes||'').toLowerCase().includes(q)
    );
  }
  return r;
}

function applySortToPool(pool) {
  const { col, dir } = ticketSort;
  return [...pool].sort((a, b) => {
    let av, bv;
    if (col === 'logged') { av = totalMins(a); bv = totalMins(b); }
    else if (col === 'est') { av = a.est||0; bv = b.est||0; }
    else { av = (a[col]||'').toString(); bv = (b[col]||'').toString(); }
    if (av < bv) return dir === 'asc' ? -1 : 1;
    if (av > bv) return dir === 'asc' ? 1 : -1;
    return 0;
  });
}

function stopTimerSilent(id) {
  if (!timers[id] || !timers[id].interval) return 0;
  clearInterval(timers[id].interval);
  timers[id].interval = null;
  const mins = Math.round((timers[id].secs||0) / 60);
  timers[id].secs = 0;
  if (mins > 0) {
    const t = db.tickets.find(t => t.id === id);
    if (t) { t.logs.push({date: todayStr(), mins}); save('update', id); }
  }
  return mins;
}

function toast(msg, icon='✓') {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span>${icon}</span>${msg}`;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(() => { try { el.remove(); } catch(e){} }, 2800);
}

function navigate(view) {

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const btn = document.getElementById('nav-' + view);
  if (btn) btn.classList.add('active');
  updateBadges();
  const showToggle = ['board','tickets','overdue','benchmark'].includes(view);
  document.getElementById('team-toggle').style.display = showToggle ? 'flex' : 'none';
  const actions = document.getElementById('topbar-actions');
  actions.innerHTML = '';

    actions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="navigate('new')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>New Ticket</button>`;

function donutChart(tickets, id, size, mode='status') {
  const total = tickets.length;
  const r = size * 0.38, cx = size/2, cy = size/2;
  if (!total) return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#E4E4E7" stroke-width="${size*0.13}"/></svg>`;

  let segs;
  if (mode === 'status') {
    segs = [
      {val: tickets.filter(t=>t.status==='To Do').length, col:'#A1A1AA'},
      {val: tickets.filter(t=>t.status==='In Progress').length, col:'#3B82F6'},
      {val: tickets.filter(t=>t.status==='Done').length, col:'#22C55E'},
    ];
  } else {
    const lm = {};
    tickets.forEach(t => { const k = t.label||'(none)'; lm[k] = (lm[k]||0)+1; });
    const cols = ['#3B82F6','#7C3AED','#06B6D4','#EC4899','#A1A1AA'];
    segs = Object.entries(lm).map(([l,v],i) => ({val:v, col:cols[i%cols.length]}));
  }
  segs = segs.filter(s => s.val > 0);

  let paths = '', offset = 0;
  segs.forEach(seg => {
    const pct = seg.val / total;
    const angle = pct * 360;
    const large = angle > 180 ? 1 : 0;
    const s = (offset - 90) * Math.PI / 180;
    const e = (offset + angle - 90) * Math.PI / 180;
    const x1 = cx + r * Math.cos(s), y1 = cy + r * Math.sin(s);
    const x2 = cx + r * Math.cos(e), y2 = cy + r * Math.sin(e);
    if (segs.length === 1) {
      paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${seg.col}" opacity=".9"/>`;
    } else {
      paths += `<path d="M${cx.toFixed(1)},${cy.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${seg.col}" opacity=".9"/>`;
    }
    offset += angle;
  });
  const innerR = (r * 0.62).toFixed(1);
  paths += `<circle cx="${cx}" cy="${cy}" r="${innerR}" fill="white"/>`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`;
}

function statusLegend(tickets) {
  const total = tickets.length || 1;
  return [
    {label:'To Do',col:'#A1A1AA',count:tickets.filter(t=>t.status==='To Do').length},
    {label:'In Progress',col:'#3B82F6',count:tickets.filter(t=>t.status==='In Progress').length},
    {label:'Done',col:'#22C55E',count:tickets.filter(t=>t.status==='Done').length},
  ].map(s=>`<div class="legend-item"><div class="legend-dot" style="background:${s.col}"></div><span class="legend-label">${s.label}</span><span class="legend-val">${s.count}</span><span class="legend-pct">${Math.round(s.count/total*100)}%</span></div>`).join('');
}

function labelLegend(tickets) {
  const total = tickets.length || 1;
  const lm = {};
  tickets.forEach(t => { const k = t.label||'(none)'; lm[k] = (lm[k]||0)+1; });
  const cols = ['#3B82F6','#7C3AED','#06B6D4','#EC4899','#A1A1AA'];
  return Object.entries(lm).map(([l,v],i)=>`<div class="legend-item"><div class="legend-dot" style="background:${cols[i%cols.length]}"></div><span class="legend-label" style="font-size:11px">${l}</span><span class="legend-val">${v}</span><span class="legend-pct">${Math.round(v/total*100)}%</span></div>`).join('');
}

function boardCard(t) {
  const running = timers[t.id] && timers[t.id].interval;
  const secs = timers[t.id] ? (timers[t.id].secs||0) : 0;
  const spent = totalMins(t);
  const isOd = isOverdue(t);
  return `<div class="board-card" id="bcard-${t.id}" draggable="true"
    ondragstart="handleDragStart(event,'${t.id}')"
    ondragend="handleDragEnd(event,'${t.id}')"
    onclick="handleCardClick(event,'${t.id}')">
    <div class="board-card-id">${t.id}${isOd?' <span class="badge b-overdue" style="font-size:9px;padding:1px 5px">Overdue</span>':''}</div>
    <div class="board-card-title">${escHtml(t.title)}</div>
    <div class="board-card-meta">${pdot(t.priority)} ${t.label ? labelBadge(t.label) : typeBadge(t.type)}</div>
    <div class="board-card-footer">
      <div class="avatar" title="${t.assignee}">${t.assignee.charAt(0)}</div>
      <span class="timer-chip ${running?'running':''}" id="bc-${t.id}">${running ? fmtTimer(secs) : (spent ? fmtTime(spent) : 'No time')}</span>
      ${t.status!=='Done' ? `<button class="btn btn-sm ${running?'btn-danger':'btn-success'}" style="margin-left:auto;font-size:10px;padding:2px 8px" onclick="event.stopPropagation();${running?'stopTimer':'startTimer'}('${t.id}')">${running?'Stop':'Start'}</button>` : ''}
    </div>
  </div>`;
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Drag & Drop ──
function handleDragStart(e, id) {
  dragId = id;
  dragDidDrop = false;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  const el = document.getElementById('bcard-' + id);
  if (el) setTimeout(() => el.classList.add('dragging'), 0);
}

function handleDragEnd(e, id) {
  const el = document.getElementById('bcard-' + id);
  if (el) el.classList.remove('dragging');
  // Remove all drag-over highlights
  document.querySelectorAll('.board-col').forEach(c => c.classList.remove('drag-over'));
}

function handleDragOver(e, status) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const col = document.getElementById('col-' + status);
  if (col) col.classList.add('drag-over');
}

function handleDragLeave(e) {
  // Only remove highlight if leaving the column entirely (not entering a child)
  const col = e.currentTarget;
  if (col && !col.contains(e.relatedTarget)) {
    col.classList.remove('drag-over');
  }
}

function handleDrop(e, newStatus) {
  e.preventDefault();
  dragDidDrop = true;
  const id = e.dataTransfer.getData('text/plain') || dragId;
  if (!id) return;
  const t = db.tickets.find(t => t.id === id);
  if (!t || t.status === newStatus) {
    document.querySelectorAll('.board-col').forEach(c => c.classList.remove('drag-over'));
    return;
  }
  // Stop timer if moving to Done
  if (newStatus === 'Done') {
    const mins = stopTimerSilent(id);
    if (mins > 0) toast(`Auto-logged ${fmtTime(mins)} · ${id} → Done`,'⏱');
    else toast(`${id} moved to Done`,'✓');
  } else {
    toast(`${id} → ${newStatus}`,'↔');
  }
  t.status = newStatus;
  save('update', id);
  updateBadges();
  renderBoard();
}

function handleCardClick(e, id) {
  // Don't open detail if this was the end of a drag
  if (dragDidDrop) { dragDidDrop = false; return; }
  openDetail(id);
}

// ═══════════════════════════════════════════════════════
// TIMERS
// ═══════════════════════════════════════════════════════
function startTimer(id) {
  if (timers[id] && timers[id].interval) return;
  if (!timers[id]) timers[id] = {secs:0, interval:null};
  timers[id].interval = setInterval(() => {
    timers[id].secs = (timers[id].secs||0) + 1;
    // Update board chip
    const bc = document.getElementById('bc-' + id);
    if (bc) { bc.textContent = fmtTimer(timers[id].secs); bc.className = 'timer-chip running'; }
    // Update table display
    const td = document.getElementById('timer-' + id);
    if (td) { td.textContent = fmtTimer(timers[id].secs); td.className = 'timer-display running'; }
  }, 1000);
  renderView();
  toast(`Timer started — ${id}`,'▶');
}

function stopTimer(id) {
  if (!timers[id] || !timers[id].interval) return;
  clearInterval(timers[id].interval);
  timers[id].interval = null;
  const mins = Math.round((timers[id].secs||0) / 60);
  timers[id].secs = 0;
  if (mins > 0) {
    const t = db.tickets.find(t => t.id === id);
    if (t) { t.logs.push({date: todayStr(), mins}); save('update', id); }
    toast(`Logged ${fmtTime(mins)} to ${id}`,'⏱');
  } else {
    toast('Timer stopped — under 1 min, not logged','ℹ');
  }
  renderView();
}

function setSort(col) {

    ticketSort.dir = 'asc';
  }
  renderView();
}

function setFilter(key, val) {
  ticketFilters[key] = val;
  renderView();
}

function debounceSearch(val) {
  clearTimeout(_searchTimeout);
  _searchTimeout = setTimeout(() => {
    ticketFilters.search = val;
    renderView();
  }, 200);
}

function clearFilters() {
  ticketFilters = {assignee:'', type:'', status:'', search:''};
  renderView();
}

function saveEdit(id) {
  const t = db.tickets.find(t => t.id === id);
  if (!t) return;
  const newStatus = document.getElementById('e-status').value;
  if (newStatus === 'Done' && t.status !== 'Done') {
    const mins = stopTimerSilent(id);
    if (mins > 0) toast(`Auto-logged ${fmtTime(mins)} before marking done`,'⏱');
  }
  const titleEl = document.getElementById('e-title');
  if (titleEl && titleEl.value.trim()) t.title = titleEl.value.trim();
  t.status   = newStatus;
  t.priority = document.getElementById('e-priority').value;
  t.assignee = document.getElementById('e-assignee').value;
  t.type     = document.getElementById('e-type').value;
  t.due      = document.getElementById('e-due').value;
  t.est      = parseInt(document.getElementById('e-est').value) || 0;
  t.notes    = document.getElementById('e-notes').value.trim();
  const lb   = document.getElementById('e-label');
  if (lb) t.label = lb.value;
  save('update', id);
  toast(`${id} updated`,'✓');
  closeDetail();
  updateBadges();
  renderView();
}

function renderLogList(t) {
  if (!t.logs || !t.logs.length) return `<div class="empty-state" style="padding:16px"><p style="font-size:13px">No time logged yet</p></div>`;
  return t.logs.map((l,i) => `
  <div class="log-item">
    <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-3)">${fmtDate(l.date)}</span>
    <span style="font-weight:500">${fmtTime(l.mins)}</span>
    <button class="btn btn-sm btn-danger" onclick="removeLog('${t.id}',${i})" style="padding:2px 8px;font-size:11px">Remove</button>

function switchDTab(tab) {
  document.querySelectorAll('#detail-overlay .tab-btn').forEach(b => b.classList.remove('active'));
  const tb = document.getElementById('dtab-' + tab);
  if (tb) tb.classList.add('active');
  ['info','time','edit'].forEach(n => {
    const el = document.getElementById('detail-' + n);
    if (el) el.style.display = n === tab ? '' : 'none';
  });
}

function closeDetail() {
  const o = document.getElementById('detail-overlay');
  if (o) o.remove();
}

function quickMarkDone(id) {
  const t = db.tickets.find(t => t.id === id);
  if (!t) return;
  const mins = stopTimerSilent(id);
  t.status = 'Done';
  save('update', id);
  if (mins > 0) toast(`${fmtTime(mins)} logged · ${id} marked done`,'✓');
  else toast(`${id} marked done`,'✓');
  closeDetail();
  updateBadges();
  renderView();
}

function reopenTicket(id) {
  const t = db.tickets.find(t => t.id === id);
  if (!t) return;
  t.status = 'To Do';
  save('update', id);
  toast(`${id} reopened`);
  closeDetail();
  updateBadges();
  renderView();
}

function deleteTicket(id) {
  if (!confirm(`Delete ${id}? This cannot be undone.`)) return;
  stopTimerSilent(id);
  delete timers[id];
  db.tickets = db.tickets.filter(t => t.id !== id);
  save('delete', id);
  toast(`${id} deleted`,'🗑');
  closeDetail();
  updateBadges();
  renderView();
}

function quickLogTime(id) {
  const minsStr = prompt('Minutes to log:');
  if (minsStr === null) return;
  const mins = parseInt(minsStr);
  if (isNaN(mins) || mins <= 0) { toast('Enter a valid number of minutes','⚠'); return; }
  const t = db.tickets.find(t => t.id === id);
  if (!t) return;
  t.logs.push({date: todayStr(), mins});
  save('update', id);
  toast(`Logged ${fmtTime(mins)} to ${id}`,'⏱');
  const ll = document.getElementById('log-list');
  if (ll) ll.innerHTML = renderLogList(t);
  renderView();
}

function removeLog(id, idx) {
  const t = db.tickets.find(t => t.id === id);
  if (!t) return;
  t.logs.splice(idx, 1);
  save('update', id);
  const ll = document.getElementById('log-list');
  if (ll) ll.innerHTML = renderLogList(t);
  renderView();
}

  if (sel) sel.innerHTML = types.map(t=>`<option>${t}</option>`).join('');

  if (lg) lg.style.display = team === 'Web' ? '' : 'none';
}

function createTicket() {
  const titleEl = document.getElementById('n-title');
  const title = (titleEl ? titleEl.value : '').trim();
  if (!title) { toast('Please enter a title','⚠'); if(titleEl) titleEl.focus(); return; }
  const team = document.getElementById('n-team').value;
  const prefix = team === 'Web' ? 'WEB' : 'IT';
  const existing = db.tickets.filter(t => t.id.startsWith(prefix + '-'));
  const maxNum = existing.reduce((a,t) => Math.max(a, parseInt(t.id.split('-')[1])||0), 0);
  const id = `${prefix}-${String(maxNum + 1).padStart(3,'0')}`;
  const labelEl = document.getElementById('n-label');
  db.tickets.push({
    id, title, team,
    type:     document.getElementById('n-type').value,
    assignee: document.getElementById('n-assignee').value,
    priority: document.getElementById('n-priority').value,
    status:   'To Do',
    due:      document.getElementById('n-due').value,
    est:      parseInt(document.getElementById('n-est').value) || 0,
    logs:     [],
    notes:    document.getElementById('n-notes').value.trim(),
    created:  todayStr(),
    label:    (team === 'Web' && labelEl) ? labelEl.value : '',
  });
  save('append', id);
  toast(`${id} created`,'✓');
  updateBadges();
  navigate('board');
}

// ═══════════════════════════════════════════════════════
// BENCHMARKS (with date range filter)
// ═══════════════════════════════════════════════════════
function renderBenchmark() {
  const range = getBenchRange();
  const teamPool = getFilteredPool();

  // Filter by date range — ticket is included if due date or created date falls in range
  const pool = teamPool.filter(t => {
    if (!range.start && !range.end) return true;
    return dateInRange(t.due, range.start, range.end) || dateInRange(t.created, range.start, range.end);
  });

  const done = pool.filter(t => t.status === 'Done');

  const byPerson = {};
  db.staff.forEach(s => {
    if (currentTeam === 'all' || s.team === currentTeam) byPerson[s.name] = {total:0,done:0,onTime:0,mins:0};
  });
  pool.forEach(t => {
    if (!byPerson[t.assignee]) byPerson[t.assignee] = {total:0,done:0,onTime:0,mins:0};
    byPerson[t.assignee].total++;
    byPerson[t.assignee].mins += totalMins(t);
    if (t.status==='Done') { byPerson[t.assignee].done++; if (!wasLate(t)) byPerson[t.assignee].onTime++; }
  });

  const byType = {};
  done.forEach(t => {
    if (!byType[t.type]) byType[t.type] = {count:0,mins:0};
    byType[t.type].count++;
    byType[t.type].mins += totalMins(t);
  });

  const maxMins = Math.max(...Object.values(byPerson).map(v=>v.mins), 1);
  const typeAvgs = Object.entries(byType).map(([type,v]) => ({type, avg: v.count ? Math.round(v.mins/v.count) : 0}));
  const maxTypeAvg = Math.max(...typeAvgs.map(v=>v.avg), 1);
  const allDone = done.filter(t => t.est > 0);
  const maxAcc = Math.max(...allDone.map(t => Math.round(totalMins(t)/t.est*100)), 100);

  const presets = [
    {key:'this-week',label:'This week'},
    {key:'last-week',label:'Last week'},
    {key:'this-month',label:'This month'},
    {key:'last-month',label:'Last month'},
    {key:'all-time',label:'All time'},
    {key:'custom',label:'Custom'},
  ];

  document.getElementById('content').innerHTML = `
  <div class="bench-filter">
    <span class="bench-range-label">Period:</span>
    <div class="preset-btns">
      ${presets.map(p=>`<button class="preset-btn ${benchFilters.preset===p.key?'active':''}" onclick="setBenchPreset('${p.key}')">${p.label}</button>`).join('')}
    </div>
    ${benchFilters.preset==='custom'?`
      <input type="date" id="bench-from" value="${benchFilters.from}" onchange="setBenchCustom()" style="font-family:'DM Mono',monospace">
      <span style="font-size:12px;color:var(--text-3)">to</span>
      <input type="date" id="bench-to" value="${benchFilters.to||todayStr()}" onchange="setBenchCustom()" style="font-family:'DM Mono',monospace">
    `:''}
    <span style="margin-left:auto;font-size:12px;color:var(--text-3)"><strong>${pool.length}</strong> tickets in range · ${range.label}</span>
  </div>

  <div class="bench-grid">
    <div class="card">
      <div class="card-header"><span class="card-title">On-time completion rate</span></div>
      <div class="card-body">
        ${Object.keys(byPerson).length === 0 ? '<div class="empty-state" style="padding:16px"><p style="font-size:13px">No data for this period</p></div>' :
          Object.entries(byPerson).map(([name,v]) => {
            const rate = v.done ? Math.round(v.onTime/v.done*100) : null;
            const col = rate===null?'var(--border-2)':rate>=80?'var(--success)':rate>=50?'var(--warning)':'var(--danger)';
            const bg  = rate===null?'var(--surface-2)':rate>=80?'var(--success-bg)':rate>=50?'var(--warning-bg)':'var(--danger-bg)';
            const tc  = rate===null?'var(--text-3)':rate>=80?'var(--success-text)':rate>=50?'var(--warning-text)':'var(--danger-text)';
            return `<div class="person-stat">
              <div class="rate-circle" style="background:${bg};color:${tc}">${rate===null?'—':rate+'%'}</div>
              <div><div style="font-size:13px;font-weight:500">${name}</div>
              <div style="font-size:11.5px;color:var(--text-3);margin-top:1px">${v.done} done · ${v.total} total${v.done?' · '+v.onTime+' on time':''}</div></div>
            </div>`;
          }).join('')
        }
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Time logged per staff</span></div>
      <div class="card-body">
        ${Object.entries(byPerson).map(([name,v])=>`
        <div class="bar-row">
          <span class="bar-name">${name}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v.mins/maxMins*100)}%;background:var(--accent)"></div></div>
          <span class="bar-val">${fmtTime(v.mins)}</span>
        </div>`).join('') || '<div class="empty-state" style="padding:16px"><p style="font-size:13px">No data</p></div>'}
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Avg time per ticket type</span></div>
      <div class="card-body">
        ${typeAvgs.length ? typeAvgs.sort((a,b)=>b.avg-a.avg).map(({type,avg})=>`
        <div class="bar-row">
          <span class="bar-name">${type}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(avg/maxTypeAvg*100)}%;background:var(--blue)"></div></div>
          <span class="bar-val">${fmtTime(avg)}</span>
        </div>`).join('') : '<div class="empty-state" style="padding:16px"><p style="font-size:13px">No completed tickets in range</p></div>'}
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Estimate accuracy</span></div>
      <div class="card-body">
        ${allDone.length ? allDone.map(t => {
          const spent = totalMins(t);
          const pct = Math.round(spent/t.est*100);
          const col = pct<=100?'var(--success)':pct<=120?'var(--warning)':'var(--danger)';
          return `<div class="bar-row">
            <span class="bar-name" title="${t.title}">${t.id}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.min(Math.round(pct/maxAcc*100),100)}%;background:${col}"></div></div>
            <span class="bar-val" style="color:${col}">${pct}%</span>
          </div>`;
        }).join('') : '<div class="empty-state" style="padding:16px"><p style="font-size:13px">No estimated tickets completed</p></div>'}
        ${allDone.length?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11.5px;color:var(--text-3)">100% = on estimate · over 100% = took longer</div>`:''}
      </div>
    </div>
  </div>`;
}

function setBenchPreset(preset) {
  benchFilters.preset = preset;
  if (preset !== 'custom') { benchFilters.from=''; benchFilters.to=''; }
  renderBenchmark();
}

function setBenchCustom() {
  const f = document.getElementById('bench-from');
  const t = document.getElementById('bench-to');
  benchFilters.from = f ? f.value : '';
  benchFilters.to   = t ? t.value : '';
  renderBenchmark();
}

function setExPreset(preset) {
  const fromEl = document.getElementById('ex-from');
  const toEl   = document.getElementById('ex-to');
  if (!fromEl || !toEl) return;
  if (preset === 'all')    { fromEl.value=''; toEl.value=''; }
  if (preset === 'week')   { const ww=getWorkWeek(0); fromEl.value=ww.start; toEl.value=ww.end; }
  if (preset === 'month')  { const mr=getMonthRange(0); fromEl.value=mr.start; toEl.value=mr.end; }
  if (preset === 'custom') { fromEl.value=''; toEl.value=todayStr(); fromEl.focus(); }
  updateExportCount();
}

function getExportPool() {
  const teamEl   = document.getElementById('ex-team');
  const fromEl   = document.getElementById('ex-from');
  const toEl     = document.getElementById('ex-to');
  const statusEl = document.getElementById('ex-status');
  const team   = teamEl   ? teamEl.value   : 'all';
  const from   = fromEl   ? fromEl.value   : '';
  const to     = toEl     ? toEl.value     : '';
  const status = statusEl ? statusEl.value : 'all';

  return db.tickets.filter(t => {
    if (team !== 'all' && t.team !== team) return false;
    if (status !== 'all' && t.status !== status) return false;
    if (from || to) { if (!dateInRange(t.due, from, to)) return false; }
    return true;
  });
}

function updateExportCount() {
  const el = document.getElementById('export-count');
  if (el) el.textContent = getExportPool().length + ' tickets';
}

function doExport() {
  const pool = getExportPool();
  if (!pool.length) { toast('No tickets match the selected filters','⚠'); return; }

  const headers = ['ID','Title','Team','Type','Assignee','Priority','Status','Due Date','Created','Estimate (mins)','Logged (mins)','On Time','Overdue','Label','Notes'];
  const rows = pool.map(t => [
    t.id,
    `"${(t.title||'').replace(/"/g,'""')}"`,
    t.team, t.type, t.assignee, t.priority, t.status,
    t.due, t.created, t.est||0, totalMins(t),
    t.status==='Done' ? (wasLate(t)?'No':'Yes') : '',
    isOverdue(t) ? 'Yes' : '',
    t.label||'',
    `"${(t.notes||'').replace(/"/g,'""')}"`
  ]);

  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `DexTrack_Export_${todayStr()}.csv`;
  a.click();

  const ov = document.getElementById('export-modal-ov');
  if (ov) ov.remove();
  toast(`Exported ${pool.length} tickets`,'📄');
}

    : `<div style="display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:50%;background:var(--warning);flex-shrink:0"></div><span style="font-size:13px;font-weight:500;color:var(--warning-text)">Not signed in</span></div>

function renderStaffList() {
  return db.staff.map(s=>`
  <div class="staff-item">
    <div class="staff-avatar">${s.name.charAt(0)}</div>
    <div style="flex:1;margin-left:8px">
      <div style="font-size:13px;font-weight:500">${escHtml(s.name)}</div>
      <div style="font-size:11.5px;color:var(--text-3)">${escHtml(s.role)} · ${s.team}</div>
    </div>
    <button class="btn btn-sm btn-danger" onclick="removeStaff('${s.id}')">Remove</button>
  </div>`).join('');
}

function addStaffModal() {
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.id = 'add-staff-modal';
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  ov.innerHTML = `<div class="modal">
    <div class="modal-header"><span class="modal-title">Add team member</span></div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:12px">
      <div class="form-group"><label class="form-label">Name <span style="color:var(--danger)">*</span></label><input class="form-control" id="m-name" placeholder="First name" onkeydown="if(event.key==='Enter')addStaff()"></div>
      <div class="form-group"><label class="form-label">Role</label><input class="form-control" id="m-role" placeholder="e.g. Web Developer"></div>
      <div class="form-group"><label class="form-label">Team</label><select class="form-control" id="m-team"><option>IT</option><option>Web</option><option>Other</option></select></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="document.getElementById('add-staff-modal').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="addStaff()">Add member</button>
    </div>
  </div>`;
  document.getElementById('modal-root').appendChild(ov);
  setTimeout(() => { const el=document.getElementById('m-name'); if(el) el.focus(); }, 50);
}

function addStaff() {
  const nameEl = document.getElementById('m-name');
  const name = nameEl ? nameEl.value.trim() : '';
  if (!name) { toast('Enter a name','⚠'); return; }
  const roleEl = document.getElementById('m-role');
  const teamEl = document.getElementById('m-team');
  const role = roleEl ? roleEl.value.trim() : '';
  const team = teamEl ? teamEl.value : 'IT';
  db.staff.push({id:'s'+Date.now(), name, role:role||team, team});
  saveStaff();
  const modal = document.getElementById('add-staff-modal');
  if (modal) modal.remove();
  toast(`${name} added`,'✓');
  const sl = document.getElementById('staff-list');
  if (sl) sl.innerHTML = renderStaffList();
}

function removeStaff(id) {
  const s = db.staff.find(s => s.id === id);
  if (!s || !confirm(`Remove ${s.name} from the team?`)) return;
  db.staff = db.staff.filter(s => s.id !== id);
  saveStaff();
  toast(`${s.name} removed`,'🗑');
  const sl = document.getElementById('staff-list');
  if (sl) sl.innerHTML = renderStaffList();
}

function resetData() {
  if (!confirm('Reset all data? This will clear the local cache. Note: this does NOT delete data from Google Sheets.')) return;
  Object.keys(timers).forEach(id => {
    if (timers[id] && timers[id].interval) clearInterval(timers[id].interval);
  });
  timers = {};
  gsRowMap = {};
  localStorage.removeItem(STORE);
  db = { staff: getDefaultStaff(), tickets: [] };
  toast('Local cache cleared. Reload to re-sync from Google Sheets.');
  navigate('dashboard');
}
